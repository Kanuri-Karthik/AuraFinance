<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Finance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Emergency Cache Buster for PWA - Force unregister
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          let hasCleared = false;
          for(let registration of registrations) {
            registration.unregister();
            hasCleared = true;
          }
          if (hasCleared && !window.location.search.includes('cleared')) {
            window.location.replace(window.location.href + (window.location.search ? '&' : '?') + 'cleared=1');
          }
        });
      }
    </script>
  </body>
</html>
